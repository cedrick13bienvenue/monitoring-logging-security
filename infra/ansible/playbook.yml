---
- name: Configure monitoring server
  hosts: monitoring
  become: true

  tasks:
    - name: Update all packages
      ansible.builtin.command: yum update -y
      changed_when: true

    - name: Install Docker and Git
      ansible.builtin.command:
        cmd: yum install -y docker git
        creates: /usr/bin/docker
      changed_when: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Install Docker Compose v2
      ansible.builtin.get_url:
        url: https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"

    - name: Symlink docker-compose for legacy compatibility
      ansible.builtin.file:
        src: /usr/local/lib/docker/cli-plugins/docker-compose
        dest: /usr/local/bin/docker-compose
        state: link

    - name: Create monitoring lab directory
      ansible.builtin.file:
        path: /opt/monitoring-lab
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Verify Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Verify Docker Compose version
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Print installed versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ compose_version.stdout }}"
